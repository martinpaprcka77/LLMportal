name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npx html-validate index.html
